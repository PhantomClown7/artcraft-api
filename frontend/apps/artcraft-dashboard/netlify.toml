# Netlify build configuration for the ArtCraft admin dashboard.
# The base directory in the Netlify site settings should be `frontend/`
# (the Nx workspace root), so these paths are relative to that.

[build]
command = "bash ./apps/artcraft-dashboard/script/netlify_build.sh"
publish = "apps/artcraft-dashboard/dist/"

# Vite emits content-hashed assets under /assets/*, so they can be cached
# forever — a new deploy produces new filenames.
[[headers]]
for = "/assets/*"

[headers.values]
"Cache-Control" = "public, max-age=31560000, immutable"
