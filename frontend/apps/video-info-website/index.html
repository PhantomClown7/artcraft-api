<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Is That Real Seedance?</title>
    <meta
      name="description"
      content="Upload a video and find out whether it's real Seedance 2.0 — or something else pretending to be."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8D%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&family=Space+Grotesk:wght@400..700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply persisted / preferred theme before paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('vi-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved ? saved === 'dark' : prefersDark || true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
